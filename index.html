<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo File Renamer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    background:#1e1e1e;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h2{
    margin-bottom:20px;
}

button{
    background:#0078d7;
    color:white;
    border:none;
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#005fb8;
}

input[type=file]{
    margin:10px 0;
}

#log{
    margin-top:20px;
    background:#111;
    border:1px solid #444;
    padding:15px;
    height:450px;
    overflow-y:auto;
    white-space:pre-wrap;
    font-family:Consolas,monospace;
}

.success{
    color:#00ff7f;
}

.error{
    color:#ff5555;
}

.warning{
    color:#ffd700;
}
</style>
</head>
<body>

<div class="container">

<h2>Promo House Number Renamer</h2>

<label>Select Excel File</label><br>
<input type="file" id="excelFile" accept=".xlsx,.xls">

<br><br>

<button id="selectFolderBtn">Select Promo Folder</button>
<button id="renameBtn">Rename Files</button>

<div id="log"></div>

</div>

<script>

let folderHandle = null;

function log(message){
    const logDiv = document.getElementById("log");
    logDiv.innerHTML += message + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

document.getElementById("selectFolderBtn").addEventListener("click", async () => {

    try{
        folderHandle = await window.showDirectoryPicker();
        log("✅ Folder selected successfully");
    }
    catch(err){
        log("❌ Folder selection cancelled");
    }

});

document.getElementById("renameBtn").addEventListener("click", async () => {

    const excelInput = document.getElementById("excelFile");

    if(excelInput.files.length === 0){
        alert("Please select Excel file");
        return;
    }

    if(!folderHandle){
        alert("Please select Promo Folder");
        return;
    }

    document.getElementById("log").innerHTML = "";

    try{

        log("Reading Excel file...");

        const excelData = await excelInput.files[0].arrayBuffer();

        const workbook = XLSX.read(excelData);

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        const rows =
            XLSX.utils.sheet_to_json(sheet,{
                header:1
            });

        let fileMap = {};

        log("Scanning folder...");

        for await (const [name,handle] of folderHandle.entries()){

            if(handle.kind !== "file")
                continue;

            const dot = name.lastIndexOf(".");

            if(dot === -1)
                continue;

            const baseName =
                name.substring(0,dot)
                .trim()
                .toLowerCase();

            fileMap[baseName] = name;
        }

        let renamedCount = 0;
        let skippedCount = 0;
        let notFoundCount = 0;

        log("<hr>");

        for(let i=1;i<rows.length;i++){

            const row = rows[i];

            const promoName =
                String(row[1] || "")
                .trim();

            const houseNumber =
                String(row[3] || "")
                .trim();

            if(!promoName || !houseNumber)
                continue;

            const key =
                promoName.toLowerCase();

            if(!fileMap[key]){

                log(
                    "❌ Not Found : " +
                    promoName
                );

                notFoundCount++;
                continue;
            }

            const oldFileName =
                fileMap[key];

            const extension =
                oldFileName.substring(
                    oldFileName.lastIndexOf(".")
                );

            const newFileName =
                houseNumber + extension;

            try{

                let exists = false;

                try{
                    await folderHandle.getFileHandle(
                        newFileName
                    );
                    exists = true;
                }
                catch{}

                if(exists){

                    log(
                        "⚠ Already Exists : " +
                        newFileName
                    );

                    skippedCount++;
                    continue;
                }

                const oldHandle =
                    await folderHandle.getFileHandle(
                        oldFileName
                    );

                const oldFile =
                    await oldHandle.getFile();

                const buffer =
                    await oldFile.arrayBuffer();

                const newHandle =
                    await folderHandle.getFileHandle(
                        newFileName,
                        {create:true}
                    );

                const writable =
                    await newHandle.createWritable();

                await writable.write(buffer);
                await writable.close();

                await folderHandle.removeEntry(
                    oldFileName
                );

                renamedCount++;

                log(
                    "✅ " +
                    oldFileName +
                    " → " +
                    newFileName
                );

            }
            catch(err){

                log(
                    "❌ Error : " +
                    oldFileName +
                    " : " +
                    err.message
                );

            }

        }

        log("<hr>");
        log("Finished");
        log("Renamed : " + renamedCount);
        log("Skipped : " + skippedCount);
        log("Not Found : " + notFoundCount);

    }
    catch(err){

        log(
            "❌ Fatal Error : " +
            err.message
        );

    }

});

</script>

</body>
</html>
