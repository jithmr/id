<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MXF House Number Renamer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    background:#1e1e1e;
    color:#fff;
    font-family:Arial,sans-serif;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h2{
    color:#4CAF50;
}

button{
    background:#0078d7;
    color:white;
    border:none;
    padding:10px 20px;
    margin:5px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#005fb8;
}

input[type=file]{
    margin-top:10px;
}

#log{
    margin-top:20px;
    background:#111;
    border:1px solid #444;
    padding:15px;
    height:500px;
    overflow-y:auto;
    font-family:Consolas,monospace;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<div class="container">

<h2>MXF House Number Renamer</h2>

<p>Select Excel File</p>
<input type="file" id="excelFile" accept=".xlsx,.xls">

<br><br>

<button id="selectFolderBtn">Select MXF Folder</button>
<button id="renameBtn">Rename Files</button>

<div id="log"></div>

</div>

<script>

let folderHandle = null;

function log(msg){
    const logDiv = document.getElementById("log");
    logDiv.innerHTML += msg + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

document.getElementById("selectFolderBtn").addEventListener("click", async () => {

    try{
        folderHandle = await window.showDirectoryPicker();
        log("✅ Folder selected");
    }
    catch(err){
        log("❌ Folder selection cancelled");
    }

});

document.getElementById("renameBtn").addEventListener("click", async () => {

    const excelInput = document.getElementById("excelFile");

    if(excelInput.files.length === 0){
        alert("Please select Excel file");
        return;
    }

    if(!folderHandle){
        alert("Please select MXF folder");
        return;
    }

    document.getElementById("log").innerHTML = "";

    try{

        log("Reading Excel...");

        const excelData =
            await excelInput.files[0].arrayBuffer();

        const workbook =
            XLSX.read(excelData);

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        const rows =
            XLSX.utils.sheet_to_json(
                sheet,
                {header:1}
            );

        let fileMap = {};

        log("Scanning folder...");

        for await (const [name, handle] of folderHandle.entries()) {

            if(handle.kind !== "file")
                continue;

            if(!name.toLowerCase().endsWith(".mxf"))
                continue;

            let baseName =
                name.replace(/\.mxf$/i,"");

            baseName = baseName
                .replace(/\s+/g,' ')
                .trim()
                .toLowerCase();

            fileMap[baseName] = name;
        }

        let renamedCount = 0;
        let skippedCount = 0;
        let notFoundCount = 0;

        log("----------------------------------------");

        for(let i=1;i<rows.length;i++){

            const row = rows[i];

            let promoName =
                String(row[1] || "")
                .trim();

            let houseNumber =
                String(row[3] || "")
                .trim();

            if(!promoName || !houseNumber)
                continue;

            promoName = promoName
                .replace(/\.mxf$/i,"")
                .replace(/\s+/g,' ')
                .trim()
                .toLowerCase();

            if(!fileMap[promoName]){

                log("❌ NOT FOUND : " + promoName);

                notFoundCount++;
                continue;
            }

            const oldFileName =
                fileMap[promoName];

            const newFileName =
                houseNumber + ".mxf";

            try{

                let exists = false;

                try{
                    await folderHandle.getFileHandle(newFileName);
                    exists = true;
                }
                catch{}

                if(exists){

                    log("⚠ ALREADY EXISTS : " + newFileName);

                    skippedCount++;
                    continue;
                }

                const oldHandle =
                    await folderHandle.getFileHandle(oldFileName);

                const oldFile =
                    await oldHandle.getFile();

                const buffer =
                    await oldFile.arrayBuffer();

                const newHandle =
                    await folderHandle.getFileHandle(
                        newFileName,
                        {create:true}
                    );

                const writable =
                    await newHandle.createWritable();

                await writable.write(buffer);
                await writable.close();

                await folderHandle.removeEntry(oldFileName);

                log(
                    "✅ RENAMED : " +
                    oldFileName +
                    " → " +
                    newFileName
                );

                renamedCount++;

            }
            catch(err){

                log(
                    "❌ ERROR : " +
                    oldFileName +
                    " : " +
                    err.message
                );

            }

        }

        log("----------------------------------------");
        log("Finished");
        log("Renamed : " + renamedCount);
        log("Skipped : " + skippedCount);
        log("Not Found : " + notFoundCount);

    }
    catch(err){

        log("❌ FATAL ERROR : " + err.message);

    }

});

</script>

</body>
</html>
